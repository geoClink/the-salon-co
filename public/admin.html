<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin | The Salon Co.</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="The Salon Co." />
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-body">

    <div id="admin-login">
        <div class="admin-login-box">
            <div class="mark">The Salon<span class="amp">&amp;</span>Co.</div>
            <p class="admin-subtitle">Owner Access</p>
            <div class="form-group">
                <label for="admin-password">Password</label>
                <input type="password" id="admin-password" placeholder="Enter password">
                <span class="field-error" id="login-error"></span>
            </div>
            <button id="admin-login-btn" class="booking-continue-btn">Enter →</button>
        </div>
    </div>

    <div id="admin-dashboard" style="display: none;">
        <header>
            <a href="index.html" style="display: flex; align-items: center; gap: 1rem;">
                <div class="mark">The Salon<span class="amp">&amp;</span>Co.</div>
                <span class="admin-label">/ Admin</span>
            </a>
        </header>
        <main class="admin-main">
            <h2 class="section-heading">Upcoming <em>bookings.</em></h2>
            <div class="admin-stats">
                <div class="stat-card">
                    <span class="stat-value" id="stat-total">—</span>
                    <span class="stat-label">Total Bookings</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="stat-today">—</span>
                    <span class="stat-label">Today</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="stat-revenue">—</span>
                    <span class="stat-label">Deposits Collected</span>
                </div>
            </div>
            <div id="bookings-table-wrap">
                <div class="bookings-filter">
                    <button class="filter-tab active" data-filter="upcoming">Upcoming</button>
                    <button class="filter-tab" data-filter="all">All</button>
                </div>
                <p id="bookings-loading">Loading bookings...</p>
                <table id="bookings-table" style="display: none;">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Stylist</th>
                            <th>Service</th>
                            <th>Deposit</th>
                            <th>Customer</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Status</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="bookings-body"></tbody>
                </table>
                <p id="bookings-empty" style="display: none;">No bookings yet.</p>
            </div>
            <div class="admin-closed-dates">
                <h2 class="section-heading">Closed <em>dates.</em></h2>
                <p class="section-subtext">Block a date to remove it from the booking calendar.</p>
                <div class="closed-dates-form">
                    <input type="date" id="closed-date-input">
                    <input type="text" id="closed-date-reason" placeholder="Reason (optional, e.g. Holiday)">
                    <button id="add-closed-date-btn" class="booking-continue-btn">Block Date</button>
                    <span class="field-error" id="closed-date-error"></span>
                </div>
                <ul id="closed-dates-list"></ul>
            </div>
        </main>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
